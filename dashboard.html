<style>
  :root {
    --bg: #ffffff;
    --card: #ffffff;
    --card-hover: #fafafa;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --text-muted: #737373;
    --accent: #000000;
    --green: #16a34a;
    --green-bg: rgba(22,163,74,0.08);
    --yellow: #d97706;
    --yellow-bg: rgba(217,119,6,0.08);
    --red: #dc2626;
    --red-bg: rgba(220,38,38,0.08);
    --progress-bg: #e5e5e5;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  /* Header */
  .header {
    background: var(--bg);
    border-bottom: 2px solid var(--accent);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    text-transform: uppercase;
  }
  .last-updated {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .time-selector {
    display: flex;
    gap: 1px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .time-btn {
    padding: 6px 12px;
    border: none;
    background: var(--bg);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    border-right: 1px solid var(--border);
  }
  .time-btn:last-child { border-right: none; }
  .time-btn:hover { color: var(--text); background: #fafafa; }
  .time-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .main { padding: 40px; max-width: 1200px; margin: 0 auto; }

  /* Revenue Hero */
  .revenue-hero {
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 40px;
  }
  .revenue-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .revenue-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .revenue-amount { font-size: 42px; font-weight: 700; letter-spacing: -2px; }
  .revenue-target { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 300; }
  .revenue-stats {
    display: flex;
    gap: 32px;
    text-align: right;
    flex-wrap: wrap;
  }
  .rev-stat-value { font-size: 20px; font-weight: 700; }
  .rev-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 400; }
  .progress-bar-track {
    width: 100%;
    height: 8px;
    background: var(--progress-bg);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.8s ease;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Section */
  .section { margin-bottom: 40px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent);
  }

  /* Bucket card */
  .bucket {
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .bucket:hover { border-color: #a3a3a3; }
  .bucket-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .bucket-header:hover { background: var(--card-hover); }
  .bucket-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bucket-icon {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .bucket-name { font-size: 14px; font-weight: 600; }
  .bucket-summary { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 400; }
  .bucket-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .bucket-value { font-size: 20px; font-weight: 700; text-align: right; }
  .bucket-growth { font-size: 11px; text-align: right; margin-top: 2px; font-weight: 500; }
  .growth-up { color: var(--green); }
  .growth-down { color: var(--red); }
  .growth-flat { color: var(--yellow); }
  .chevron {
    width: 16px;
    height: 16px;
    transition: transform 0.2s;
    color: var(--text-muted);
  }
  .bucket.open .chevron { transform: rotate(180deg); }

  .bucket-body {
    display: none;
    padding: 0 24px 20px;
    border-top: 1px solid var(--border);
  }
  .bucket.open .bucket-body { display: block; }

  /* Stat rows inside bucket */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    padding-top: 16px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .stat-card {
    background: var(--bg);
    padding: 16px;
    position: relative;
  }
  .stat-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; font-weight: 500; }
  .stat-value { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .stat-change { font-size: 11px; font-weight: 500; }

  /* Status light */
  .status-light {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-green { background: var(--green); }
  .status-yellow { background: var(--yellow); }
  .status-red { background: var(--red); }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border: 1px solid;
  }
  .badge-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .badge-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* OKR Section */
  .okr-card {
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .okr-header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    cursor: pointer;
    gap: 14px;
    transition: background 0.1s;
  }
  .okr-header:hover { background: var(--card-hover); }
  .okr-obj-label { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .okr-obj-text { font-size: 13px; font-weight: 600; }
  .okr-body {
    display: none;
    padding: 0 24px 16px;
    border-top: 1px solid var(--border);
  }
  .okr-card.open .okr-body { display: block; }
  .okr-card.open .chevron { transform: rotate(180deg); }
  .kr-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .kr-row:last-child { border-bottom: none; }
  .kr-text { font-size: 12px; flex: 1; min-width: 200px; font-weight: 400; }
  .kr-right { display: flex; align-items: center; gap: 12px; }
  .kr-progress {
    width: 120px;
    height: 4px;
    background: var(--progress-bg);
    overflow: hidden;
  }
  .kr-progress-fill {
    height: 100%;
    transition: width 0.5s;
  }
  .kr-pct { font-size: 12px; font-weight: 600; width: 40px; text-align: right; }
  .kr-status-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 16px 20px; }
    .main { padding: 20px; }
    .revenue-amount { font-size: 28px; }
    .revenue-stats { gap: 16px; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .bucket-header { padding: 14px 16px; }
    .bucket-value { font-size: 18px; }
  }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns: 1fr; }
    .time-selector { gap: 0; }
    .time-btn { padding: 5px 8px; font-size: 10px; }
  }
</style>

  return s === "green" ? "badge-green" : s === "yellow" ? "badge-yellow" : "badge-red";

  return s === "green" ? "On Track" : s === "yellow" ? "Off Track" : "Needs Attention";

  return s === "green" ? "var(--green)" : s === "yellow" ? "var(--yellow)" : "var(--red)";

function chevronSVG() {

function fmtMoney(n) {
  if (n >= 1000000) return "$" + (n/1000000).toFixed(1) + "M";

  return "$" + n.toLocaleString();
}

    {key:"mtd",label:"MTD"},{key:"qtd",label:"QTD"},{key:"ytd",label:"YTD"},{key:"90d",label:"Last 90 Days"}
  ];
  return `<div class="time-selector" id="timePeriod">${periods.map(p =>
    `<button class="time-btn${p.key===currentPeriod?" active":""}" data-period="${p.key}">${p.label}</button>`
  ).join("")}</div>`;
}

function renderRevenue(d) {
  const r = d.revenue;
  const pct = Math.min((r.current / r.target) * 100, 100);
  document.getElementById("revenueHero").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
      <div></div>
      ${timeButtonsHTML()}
    </div>
    <div class="revenue-top">
      <div>
        <div class="revenue-label">Annual Revenue &mdash; ${r.periodLabel}</div>
        <div class="revenue-amount">${fmtMoney(r.current)}</div>
        <div class="revenue-target">of ${fmtMoney(r.target)} annual target</div>
      </div>
      <div class="revenue-stats">
        <div>
          <div class="rev-stat-value">${fmtMoney(r.earned)}</div>
          <div class="rev-stat-label">${r.periodLabel} Revenue</div>
        </div>
        <div>
          <div class="rev-stat-value">${fmtMoney(r.projected)}</div>
          <div class="rev-stat-label">Projected Annual</div>
        </div>
        <div>
          <div class="rev-stat-value">${pct.toFixed(1)}%</div>
          <div class="rev-stat-label">To Target</div>
        </div>
      </div>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="progress-meta">
      <span>${pct.toFixed(1)}% of annual target reached</span>
      <span>${fmtMoney(r.target - r.current)} remaining</span>
    </div>`;
  // Re-bind time selector click inside revenue hero
  document.getElementById("timePeriod").addEventListener("click", handleTimePeriodClick);
}

function renderOKRs(d) {
  const c = document.getElementById("okrContainer");
  c.innerHTML = d.okrs.map((okr, i) => `
    <div class="okr-card" data-okr="${i}">
      <div class="okr-header" onclick="toggleOKR(${i})">
        <div style="flex:1">
          <div class="okr-obj-label">Objective ${i+1}</div>
          <div class="okr-obj-text">${okr.objective}</div>
        </div>
        ${chevronSVG()}
      </div>
      <div class="okr-body">
        ${okr.keyResults.map((kr, j) => `
          <div class="kr-row">
            <div class="kr-text">${kr.text}</div>
            <div class="kr-right">
              <div class="kr-progress">
                <div class="kr-progress-fill" style="width:${kr.progress}%;background:${progressColor(kr.status)}"></div>
              </div>
              <div class="kr-pct">${kr.progress}%</div>
              <select class="kr-status-select" onchange="updateKRStatus(${i},${j},this.value)" style="border-color:${progressColor(kr.status)}">
                <option value="green" ${kr.status==="green"?"selected":""}>On Track</option>
                <option value="yellow" ${kr.status==="yellow"?"selected":""}>Off Track</option>
                <option value="red" ${kr.status==="red"?"selected":""}>Needs Attention</option>
              </select>
              <div class="status-light ${statusClass(kr.status)}"></div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function renderBuckets(d) {
  const c = document.getElementById("bucketContainer");
  const order = ["sales","email","social","ads","cs"];
  c.innerHTML = order.map(key => {
    const b = d.buckets[key];
    return `
    <div class="bucket" data-bucket="${key}">
      <div class="bucket-header" onclick="toggleBucket('${key}')">
        <div class="bucket-left">
          <div class="bucket-icon" style="background:${b.iconBg}22;color:${b.iconBg}">${b.icon}</div>
          <div>
            <div class="bucket-name">${b.name}</div>
            <div class="bucket-summary">${b.summary}</div>
          </div>
        </div>
        <div class="bucket-right">
          <div>
            <div class="bucket-value">${b.value}</div>
            <div class="bucket-growth ${growthClass(b.growthDir)}">${b.growth} vs prior period</div>
          </div>
          <span class="status-badge ${badgeClass(b.status)}">
            <span class="status-light ${statusClass(b.status)}"></span>
            ${badgeLabel(b.status)}
          </span>
          ${chevronSVG()}
        </div>
      </div>
      <div class="bucket-body">
        <div class="stat-grid">
          ${b.stats.map(s => `
            <div class="stat-card">
              <div class="stat-top">
                <div class="stat-label">${s.label}</div>
                <div class="status-light ${statusClass(s.status)}"></div>
              </div>
              <div class="stat-value">${s.value}</div>
              <div class="stat-change ${growthClass(s.dir)}">${s.change} vs prior period</div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>`;
  }).join("");
}

function render() {
  const d = DATA[currentPeriod];
  renderRevenue(d);
  renderOKRs(d);
  renderBuckets(d);
}

function toggleBucket(key) {
  document.querySelector(`[data-bucket="${key}"]`).classList.toggle("open");
}
function toggleOKR(i) {
  document.querySelector(`[data-okr="${i}"]`).classList.toggle("open");
}
function updateKRStatus(oi, ki, val) {
  DATA[currentPeriod].okrs[oi].keyResults[ki].status = val;
  renderOKRs(DATA[currentPeriod]);
  // re-open the OKR that was open
  document.querySelector(`[data-okr="${oi}"]`).classList.add("open");
}

// Time period switching
function handleTimePeriodClick(e) {
  if (!e.target.classList.contains("time-btn")) return;
  currentPeriod = e.target.dataset.period;
  render();
}

// Initial render
render();
</script>

</body>
</html>
